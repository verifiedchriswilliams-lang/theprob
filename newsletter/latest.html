<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Prob — Newsletter Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080b0f; font-family: 'Courier New', monospace; color: #edf2f7; }
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #0d1117; border-bottom: 1px solid #1e2a38; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .topbar-label { font-size: 11px; color: #8ba3bc; letter-spacing: 0.15em; text-transform: uppercase; flex: 1; }
  .copy-btn { background: #00e5a0; color: #080b0f; border: none; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; border-radius: 2px; }
  .copy-btn:hover { background: #00c990; }
  .copy-btn.copied { background: #1e2a38; color: #00e5a0; }
  .subject-line { font-size: 11px; color: #f59e0b; letter-spacing: 0.08em; }
  .preview-frame { margin-top: 55px; width: 100%; border: none; min-height: calc(100vh - 55px); display: block; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-label">Newsletter Preview &mdash; Mar 28, 2026</div>
    <div class="subject-line">Subject: Lab Notes: We Rewired the Algorithm (Here's What Changed)</div>
  </div>
  <button class="copy-btn" id="copyBtn" onclick="copyEmail()">Copy Email HTML</button>
</div>
<iframe class="preview-frame" src="latest-email.html" id="previewFrame"></iframe>
<script>
async function copyEmail() {
  const btn = document.getElementById('copyBtn');
  try {
    const resp = await fetch('latest-copy.html');
    const html = await resp.text();
    await navigator.clipboard.writeText(html);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Email HTML'; btn.classList.remove('copied'); }, 3000);
  } catch(e) {
    btn.textContent = 'Error — try again';
    console.error(e);
  }
}
</script>
</body>
</html>
