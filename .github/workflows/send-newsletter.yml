name: Build and Send Daily Newsletter

on:
  schedule:
    - cron: '50 10 * * *'  # 6:50 AM EDT (UTC-4) = 10:50 UTC → schedules Beehiiv send at 7:00 AM ET
    # DST updated Mar 6 2026 — was '50 11 * * *' (EST/UTC-5), now '50 10 * * *' (EDT/UTC-4)
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build and send newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEEHIIV_API_KEY:   ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:    ${{ secrets.BEEHIIV_PUB_ID }}
        run: python scripts/send_newsletter.py

      - name: Commit newsletter to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/
          git diff --staged --quiet || git commit -m "chore: build daily newsletter [skip ci]"
          git pull --rebase origin main
          git push
