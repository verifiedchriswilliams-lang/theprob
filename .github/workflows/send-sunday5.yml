name: Build and Send Sunday 5 Newsletter

on:
  schedule:
    - cron: '50 10 * * 0'  # 6:50 AM EDT (UTC-4) every Sunday — same send time as daily newsletter
  workflow_dispatch:        # allow manual trigger for testing / sending today's edition

jobs:
  build-sunday5:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build Sunday 5 newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEEHIIV_API_KEY:   ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:    ${{ secrets.BEEHIIV_PUB_ID }}
        run: python scripts/send_sunday5.py

      - name: Commit newsletter to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/
          git diff --staged --quiet || git commit -m "chore: build Sunday 5 newsletter [skip ci]"
          git pull --rebase origin main
          git push
