name: Run Trading Bot

on:
  schedule:
    # 5 minutes past each hour — after fetch-markets (runs at :00) has fresh data
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (select trades but do NOT place real orders)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest data (markets.json may have just been updated)
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run trading bot
        env:
          KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "Running in DRY RUN mode — no real orders will be placed."
          fi
          python scripts/run_bot.py $DRY_RUN_FLAG

      - name: Commit trade ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_trade_ledger.json
          git diff --staged --quiet || git commit -m "chore: update trade ledger [skip ci]"
          git pull --rebase origin main
          git push
